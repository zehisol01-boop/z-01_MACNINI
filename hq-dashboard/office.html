<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZE HQ — Escritório Futuristas</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
#canvas-container { width: 100vw; height: 100vh; }
canvas { display: block; }

/* TOP BAR */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: rgba(10,10,20,0.92);
  border-bottom: 1px solid rgba(255,200,50,0.2);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  z-index: 100;
}

#office-title {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 3px;
  color: #ffd700;
  text-transform: uppercase;
  margin-right: 12px;
}

.agent-bubble {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  font-weight: bold;
  color: #fff;
  cursor: pointer;
  border: 2px solid rgba(255,255,255,0.2);
  transition: transform 0.2s, border-color 0.2s;
  position: relative;
}
.agent-bubble:hover { transform: scale(1.15); border-color: #ffd700; }
.agent-bubble.active { border-color: #ffd700; box-shadow: 0 0 10px #ffd70088; }
.agent-bubble .online-dot {
  position: absolute;
  bottom: 1px; right: 1px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #ffd700;
  border: 1px solid #000;
}

.agent-count {
  color: #ffd70088;
  font-size: 12px;
  font-weight: 600;
  margin: 0 4px;
}

.agents-total {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
  color: #ffd700;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
}

/* NAME TAGS */
.name-tag {
  position: fixed;
  background: rgba(10,10,20,0.9);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  padding: 3px 10px 3px 8px;
  display: flex;
  align-items: center;
  gap: 6px;
  pointer-events: none;
  transform: translateX(-50%);
  white-space: nowrap;
  z-index: 50;
}

.name-tag .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #ffd700;
  box-shadow: 0 0 6px #ffd700;
  flex-shrink: 0;
}

.name-tag .name { color: #fff; font-size: 12px; font-weight: 600; }
.name-tag .status { color: #ffd70088; font-size: 10px; margin-left: 4px; }

/* BOTTOM INFO */
#bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 36px;
  background: rgba(10,10,20,0.85);
  border-top: 1px solid rgba(255,200,50,0.15);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 20px;
  font-size: 11px;
  color: rgba(255,215,0,0.5);
  letter-spacing: 1px;
  z-index: 100;
}

.bottom-item { display: flex; align-items: center; gap: 5px; }
.b-dot { width: 6px; height: 6px; border-radius: 50%; }
.b-dot.g { background: #00ff88; box-shadow: 0 0 4px #00ff88; }
.b-dot.b { background: #0088ff; box-shadow: 0 0 4px #0088ff; }
.b-dot.y { background: #ffd700; box-shadow: 0 0 4px #ffd700; animation: bpulse 1.5s infinite; }
@keyframes bpulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

#clock-bottom { margin-left: auto; color: #ffd70088; font-size: 11px; }

/* AGENT DETAIL PANEL */
#agent-panel {
  position: fixed;
  top: 62px; right: 16px;
  width: 200px;
  background: rgba(10,10,20,0.92);
  border: 1px solid rgba(255,200,50,0.2);
  border-radius: 6px;
  padding: 12px;
  z-index: 100;
  display: none;
}

#agent-panel .ap-name {
  font-size: 14px; font-weight: 700; color: #ffd700;
  margin-bottom: 4px;
}
#agent-panel .ap-role { font-size: 10px; color: rgba(255,255,255,0.5); margin-bottom: 10px; letter-spacing: 1px; }
.ap-row { display: flex; justify-content: space-between; font-size: 11px; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.ap-label { color: rgba(255,255,255,0.4); }
.ap-value { color: #fff; }
.ap-bar { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.ap-fill { height: 100%; background: #ffd700; border-radius: 2px; animation: apfill 2s ease-in-out infinite alternate; }
@keyframes apfill { from{width:25%} to{width:90%} }
</style>
</head>
<body>

<div id="topbar">
  <div id="office-title">ZE HQ</div>
  <div class="agent-bubble active" style="background:#2d7a4f" onclick="focusAgent(0)" title="ZE">Z<div class="online-dot"></div></div>
  <div class="agent-bubble" style="background:#1a4a8a" onclick="focusAgent(1)" title="OPS">O<div class="online-dot"></div></div>
  <div class="agent-bubble" style="background:#6a4a00" onclick="focusAgent(2)" title="FIN">F<div class="online-dot" style="opacity:0.5"></div></div>
  <div class="agent-bubble" style="background:#5a1a6a; opacity:0.5" title="MKT">M</div>
  <div class="agent-bubble" style="background:#6a1a1a; opacity:0.5" title="NOC">N</div>
  <div class="agent-count">+2</div>
  <div class="agents-total">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ffd700" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    5 AGENTS
  </div>
</div>

<div id="canvas-container"></div>

<!-- Name tags (positioned by JS) -->
<div id="nametag-ze" class="name-tag">
  <div class="dot"></div>
  <div class="name">ZE</div>
  <div class="status" id="ze-status">ATIVO</div>
</div>
<div id="nametag-ops" class="name-tag">
  <div class="dot"></div>
  <div class="name">OPS</div>
  <div class="status">STANDBY</div>
</div>
<div id="nametag-fin" class="name-tag">
  <div class="dot" style="opacity:0.5"></div>
  <div class="name">FIN</div>
  <div class="status" style="color:#ff888844">IDLE</div>
</div>

<div id="agent-panel">
  <div class="ap-name" id="ap-name">ZE 🧠</div>
  <div class="ap-role" id="ap-role">COO DIGITAL · BRAÇO DIREITO</div>
  <div class="ap-row"><span class="ap-label">STATUS</span><span class="ap-value" style="color:#00ff88">ONLINE</span></div>
  <div class="ap-row"><span class="ap-label">MODELO</span><span class="ap-value">Sonnet 4.6</span></div>
  <div class="ap-row"><span class="ap-label">MEMÓRIA</span><span class="ap-value">QMD · 12 docs</span></div>
  <div class="ap-row"><span class="ap-label">TAREFA</span><span class="ap-value" id="ap-task">Processando...</span></div>
  <div class="ap-bar"><div class="ap-fill"></div></div>
</div>

<div id="bottom-bar">
  <div class="bottom-item"><div class="b-dot g"></div>GATEWAY</div>
  <div class="bottom-item"><div class="b-dot g"></div>TELEGRAM</div>
  <div class="bottom-item"><div class="b-dot g"></div>QMD</div>
  <div class="bottom-item"><div class="b-dot y"></div>BACKUP 03:00</div>
  <div class="bottom-item"><div class="b-dot b"></div>10 DISPOSITIVOS</div>
  <div id="clock-bottom">--:--:--</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── SCENE SETUP ──────────────────────────────
const container = document.getElementById('canvas-container');
const W = () => window.innerWidth;
const H = () => window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W(), H());
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 40, 80);

// Isometric camera
const aspect = W() / H();
const frustum = 14;
const camera = new THREE.OrthographicCamera(
  -frustum * aspect, frustum * aspect,
  frustum, -frustum, 0.1, 200
);
camera.position.set(20, 20, 20);
camera.lookAt(0, 0, 0);

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff4e0, 1.0);
sun.position.set(15, 30, 15);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 100;
sun.shadow.camera.left = -25;
sun.shadow.camera.right = 25;
sun.shadow.camera.top = 25;
sun.shadow.camera.bottom = -25;
scene.add(sun);

const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
fillLight.position.set(-10, 10, -10);
scene.add(fillLight);

// ── MATERIALS ────────────────────────────────
const MAT = {
  floor:    new THREE.MeshLambertMaterial({ color: 0xf0e8d0 }),
  wall:     new THREE.MeshLambertMaterial({ color: 0xe8e0d0 }),
  wallDark: new THREE.MeshLambertMaterial({ color: 0xccbfb0 }),
  desk:     new THREE.MeshLambertMaterial({ color: 0xa0714a }),
  deskTop:  new THREE.MeshLambertMaterial({ color: 0xb8845a }),
  chair:    new THREE.MeshLambertMaterial({ color: 0x6a3a5a }),
  chairSeat:new THREE.MeshLambertMaterial({ color: 0x7a4a6a }),
  screen:   new THREE.MeshLambertMaterial({ color: 0x1a2a3a }),
  screenOn: new THREE.MeshLambertMaterial({ color: 0x4af0ff, emissive: 0x1a7080 }),
  plant:    new THREE.MeshLambertMaterial({ color: 0x2a9a3a }),
  plantPot: new THREE.MeshLambertMaterial({ color: 0x6a4a2a }),
  table:    new THREE.MeshLambertMaterial({ color: 0xb8905a }),
  carpet:   new THREE.MeshLambertMaterial({ color: 0xd0c0a0 }),
  sofa:     new THREE.MeshLambertMaterial({ color: 0x8a5a3a }),
  shelf:    new THREE.MeshLambertMaterial({ color: 0x9a6a3a }),
  server:   new THREE.MeshLambertMaterial({ color: 0x2a3a4a }),
  glass:    new THREE.MeshLambertMaterial({ color: 0x8ab0c8, transparent: true, opacity: 0.4 }),
};

function box(w, h, d, mat, rx=0, ry=0, rz=0) {
  const g = new THREE.BoxGeometry(w, h, d);
  const m = new THREE.Mesh(g, mat);
  m.castShadow = true;
  m.receiveShadow = true;
  m.rotation.set(rx, ry, rz);
  return m;
}

function group(...meshes) {
  const g = new THREE.Group();
  meshes.forEach(m => g.add(m));
  return g;
}

// ── OFFICE LAYOUT ─────────────────────────────
// Floor
const floor = box(30, 0.2, 22, MAT.floor);
floor.position.set(0, -0.1, 0);
scene.add(floor);

// Carpet area (meeting zone)
const carpet = box(8, 0.05, 8, MAT.carpet);
carpet.position.set(6, 0.02, -3);
scene.add(carpet);

// Walls
function addWall(x, y, z, w, h, d, mat) {
  const m = box(w, h, d, mat);
  m.position.set(x, y, z);
  scene.add(m);
}

// Back walls
addWall(0, 2, -11, 30, 4.2, 0.3, MAT.wallDark);
addWall(-15, 2, 0, 0.3, 4.2, 22, MAT.wall);
addWall(15, 2, 0, 0.3, 4.2, 22, MAT.wallDark);

// Window blinds on back wall
for (let i = -12; i <= 12; i += 3) {
  const blind = box(2.5, 0.08, 0.1, new THREE.MeshLambertMaterial({color: 0xccb090}));
  blind.position.set(i, 3.5, -10.8);
  scene.add(blind);
}

// Internal room divider (conference room)
addWall(8, 1.5, -3, 0.15, 3, 10, MAT.glass);
addWall(11, 1.5, -8, 6, 3, 0.15, MAT.glass);

// ── FURNITURE ────────────────────────────────
function makeDesk(x, z, rotY = 0) {
  const g = new THREE.Group();
  // Legs
  [[-0.7,-0.7],[0.7,-0.7],[-0.7,0.7],[0.7,0.7]].forEach(([lx,lz]) => {
    const leg = box(0.1, 0.7, 0.1, MAT.desk);
    leg.position.set(lx, 0.35, lz);
    g.add(leg);
  });
  // Top
  const top = box(1.8, 0.12, 1.5, MAT.deskTop);
  top.position.set(0, 0.76, 0);
  g.add(top);
  // Monitor
  const stand = box(0.08, 0.3, 0.08, MAT.desk);
  stand.position.set(0.3, 0.96, -0.3);
  g.add(stand);
  const screen = box(0.8, 0.5, 0.06, MAT.screen);
  screen.position.set(0.3, 1.3, -0.3);
  g.add(screen);
  const screenGlow = box(0.72, 0.42, 0.02, MAT.screenOn);
  screenGlow.position.set(0.3, 1.3, -0.27);
  g.add(screenGlow);
  // Keyboard
  const kb = box(0.6, 0.04, 0.25, new THREE.MeshLambertMaterial({color: 0x3a3a3a}));
  kb.position.set(0.1, 0.83, 0.2);
  g.add(kb);

  g.position.set(x, 0, z);
  g.rotation.y = rotY;
  scene.add(g);
  return g;
}

function makeChair(x, z, rotY = 0) {
  const g = new THREE.Group();
  // Base cross
  const base = box(1.0, 0.06, 1.0, MAT.chair);
  base.position.set(0, 0.25, 0);
  g.add(base);
  // Pole
  const pole = box(0.08, 0.3, 0.08, MAT.chair);
  pole.position.set(0, 0.45, 0);
  g.add(pole);
  // Seat
  const seat = box(0.7, 0.1, 0.7, MAT.chairSeat);
  seat.position.set(0, 0.65, 0);
  g.add(seat);
  // Back
  const back = box(0.7, 0.7, 0.08, MAT.chairSeat);
  back.position.set(0, 1.05, -0.32);
  g.add(back);

  g.position.set(x, 0, z);
  g.rotation.y = rotY;
  scene.add(g);
  return g;
}

// Desks layout
makeDesk(-8, -7); makeChair(-8, -6, Math.PI);
makeDesk(-4, -7); makeChair(-4, -6, Math.PI);
makeDesk( 0, -7); makeChair( 0, -6, Math.PI);

makeDesk(-8, -4); makeChair(-8, -3, Math.PI);
makeDesk(-4, -4); makeChair(-4, -3, Math.PI);

makeDesk(-8, -1); makeChair(-8,  0, Math.PI);
makeDesk(-4, -1); makeChair(-4,  0, Math.PI);

makeDesk( 4, -7); makeChair( 4, -6, Math.PI);
makeDesk( 4, -4); makeChair( 4, -3, Math.PI);

// Conference room table
const confTable = box(4, 0.15, 3, MAT.table);
confTable.position.set(6, 0.75, -3);
scene.add(confTable);
// Conference chairs around table
[[-1.5,0],[1.5,0],[0,-2],[0,2],[-1.5,-2],[1.5,-2]].forEach(([dx,dz]) => {
  makeChair(6+dx, -3+dz, dz < 0 ? Math.PI : 0);
});

// Reception desk (L-shape)
const recDesk1 = box(4, 0.9, 1, MAT.deskTop);
recDesk1.position.set(2, 0.45, 7);
scene.add(recDesk1);
const recDesk2 = box(1, 0.9, 2.5, MAT.deskTop);
recDesk2.position.set(3.5, 0.45, 5.75);
scene.add(recDesk2);
const recTop1 = box(4, 0.12, 1, MAT.desk);
recTop1.position.set(2, 0.9, 7);
scene.add(recTop1);

// Sofa
const sofaBase = box(3, 0.5, 1, MAT.sofa);
sofaBase.position.set(9, 0.25, 6);
scene.add(sofaBase);
const sofaBack = box(3, 0.6, 0.3, MAT.sofa);
sofaBack.position.set(9, 0.75, 6.5);
scene.add(sofaBack);
[[-1,0],[0,0],[1,0]].forEach(([dx]) => {
  const arm = box(0.3, 0.5, 1, MAT.sofa);
  arm.position.set(9+dx*1.2, 0.55, 6);
  scene.add(arm);
});

// Small coffee table
const coffeeTable = box(1.2, 0.3, 0.8, MAT.table);
coffeeTable.position.set(9, 0.15, 4.5);
scene.add(coffeeTable);

// Bookshelf
function makeShelf(x, z, rotY = 0) {
  const g = new THREE.Group();
  const body = box(1.8, 2.2, 0.4, MAT.shelf);
  body.position.set(0, 1.1, 0);
  g.add(body);
  // Books
  const colors = [0xff4444, 0x4488ff, 0x44cc44, 0xffcc44, 0xcc44cc, 0xff8844];
  for (let i = 0; i < 3; i++) {
    for (let j = 0; j < 4; j++) {
      const book = box(0.12, 0.4, 0.32, new THREE.MeshLambertMaterial({color: colors[(i*4+j)%6]}));
      book.position.set(-0.6 + j*0.32, 0.4 + i*0.65, 0.05);
      g.add(book);
    }
  }
  g.position.set(x, 0, z);
  g.rotation.y = rotY;
  scene.add(g);
}
makeShelf(14, -9, -Math.PI/2);
makeShelf(14, -6, -Math.PI/2);
makeShelf(14, 5, -Math.PI/2);

// Plants (glowing teal, like in screenshots)
function makePlant(x, z) {
  const g = new THREE.Group();
  const pot = box(0.4, 0.5, 0.4, MAT.plantPot);
  pot.position.set(0, 0.25, 0);
  g.add(pot);
  const stem = box(0.08, 1.2, 0.08, MAT.plant);
  stem.position.set(0, 1.1, 0);
  g.add(stem);
  // Glowing leaves
  const leafMat = new THREE.MeshLambertMaterial({color: 0x00ff88, emissive: 0x004422});
  for (let i = 0; i < 4; i++) {
    const leaf = box(0.3, 0.6, 0.06, leafMat);
    leaf.position.set(Math.sin(i*Math.PI/2)*0.25, 1.5 + i*0.1, Math.cos(i*Math.PI/2)*0.25);
    leaf.rotation.y = i * Math.PI/2;
    leaf.rotation.z = Math.PI/6;
    g.add(leaf);
  }
  g.position.set(x, 0, z);
  scene.add(g);
}
makePlant(5, -1);
makePlant(-13, -8);
makePlant(13, 3);

// Server rack area
function makeServer(x, z) {
  const g = new THREE.Group();
  const body = box(0.8, 2.0, 0.5, MAT.server);
  body.position.set(0, 1.0, 0);
  g.add(body);
  // LED strips
  for (let i = 0; i < 6; i++) {
    const colors = [0x00ff88, 0x0088ff, 0x00ff88, 0xff4444, 0x0088ff, 0x00ff88];
    const led = box(0.5, 0.04, 0.02, new THREE.MeshLambertMaterial({
      color: colors[i], emissive: colors[i], emissiveIntensity: 0.8
    }));
    led.position.set(0, 0.3 + i*0.28, 0.27);
    g.add(led);
  }
  g.position.set(x, 0, z);
  scene.add(g);
}
makeServer(13.5, -3);
makeServer(13.5, -1.5);
makeServer(13.5, 0);

// ── VOXEL CHARACTERS ─────────────────────────
function makeVoxelAgent(bodyColor, headColor, name) {
  const g = new THREE.Group();
  g.userData = { name, walkCycle: Math.random() * Math.PI * 2, task: 'IDLE' };

  const bMat = new THREE.MeshLambertMaterial({ color: bodyColor });
  const hMat = new THREE.MeshLambertMaterial({ color: headColor });
  const skinMat = new THREE.MeshLambertMaterial({ color: 0xffccaa });
  const pantsMat = new THREE.MeshLambertMaterial({ color: 0x2a2a4a });
  const shoeMat = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });
  const eyeMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const pupilMat = new THREE.MeshLambertMaterial({ color: 0x1a1a2a });

  // HEAD
  const head = box(0.52, 0.52, 0.52, hMat);
  head.position.set(0, 1.68, 0);
  g.add(head);

  // Face details
  const eyeL = box(0.1, 0.1, 0.06, eyeMat);
  eyeL.position.set(-0.13, 1.72, 0.27);
  g.add(eyeL);
  const eyeR = box(0.1, 0.1, 0.06, eyeMat);
  eyeR.position.set(0.13, 1.72, 0.27);
  g.add(eyeR);
  const pupilL = box(0.06, 0.06, 0.04, pupilMat);
  pupilL.position.set(-0.11, 1.71, 0.3);
  g.add(pupilL);
  const pupilR = box(0.06, 0.06, 0.04, pupilMat);
  pupilR.position.set(0.15, 1.71, 0.3);
  g.add(pupilR);

  // BODY/TORSO
  const torso = box(0.5, 0.55, 0.3, bMat);
  torso.position.set(0, 1.15, 0);
  g.add(torso);

  // Shirt detail
  const collar = box(0.2, 0.12, 0.06, new THREE.MeshLambertMaterial({color: 0xffffff}));
  collar.position.set(0, 1.38, 0.18);
  g.add(collar);

  // HIPS
  const hips = box(0.48, 0.2, 0.28, pantsMat);
  hips.position.set(0, 0.87, 0);
  g.add(hips);

  // LEGS (separate for animation)
  const legL = new THREE.Group();
  const legLMesh = box(0.2, 0.52, 0.22, pantsMat);
  legLMesh.position.y = -0.26;
  legL.add(legLMesh);
  const shoeL = box(0.22, 0.12, 0.28, shoeMat);
  shoeL.position.set(0, -0.55, 0.04);
  legL.add(shoeL);
  legL.position.set(-0.14, 0.77, 0);
  g.add(legL);

  const legR = new THREE.Group();
  const legRMesh = box(0.2, 0.52, 0.22, pantsMat);
  legRMesh.position.y = -0.26;
  legR.add(legRMesh);
  const shoeR = box(0.22, 0.12, 0.28, shoeMat);
  shoeR.position.set(0, -0.55, 0.04);
  legR.add(shoeR);
  legR.position.set(0.14, 0.77, 0);
  g.add(legR);

  // ARMS (separate for animation)
  const armL = new THREE.Group();
  const armLMesh = box(0.2, 0.48, 0.22, bMat);
  armLMesh.position.y = -0.24;
  armL.add(armLMesh);
  const handL = box(0.18, 0.18, 0.18, skinMat);
  handL.position.set(0, -0.52, 0);
  armL.add(handL);
  armL.position.set(-0.36, 1.35, 0);
  g.add(armL);

  const armR = new THREE.Group();
  const armRMesh = box(0.2, 0.48, 0.22, bMat);
  armRMesh.position.y = -0.24;
  armR.add(armRMesh);
  const handR = box(0.18, 0.18, 0.18, skinMat);
  handR.position.set(0, -0.52, 0);
  armR.add(handR);
  armR.position.set(0.36, 1.35, 0);
  g.add(armR);

  g.userData.legL = legL;
  g.userData.legR = legR;
  g.userData.armL = armL;
  g.userData.armR = armR;
  g.userData.head = head;

  return g;
}

// Create agents
const agentDefs = [
  { color: 0x2a7a4a, head: 0x1a5a38, name: 'ZE',  x: -3, z: -3, active: true },
  { color: 0x1a4a8a, head: 0x0a2a5a, name: 'OPS', x:  4, z:  1, active: true },
  { color: 0x7a5a10, head: 0x4a3a08, name: 'FIN', x:  0, z:  4, active: false },
];

const agentObjects = agentDefs.map(def => {
  const obj = makeVoxelAgent(def.color, def.head, def.name);
  obj.position.set(def.x, 0, def.z);
  obj.userData.tx = def.x;
  obj.userData.tz = def.z;
  obj.userData.active = def.active;
  obj.userData.moveTimer = Math.floor(Math.random() * 200);
  scene.add(obj);
  return obj;
});

// ── ANIMATION ────────────────────────────────
const tasks = ['ANALISANDO', 'EXECUTANDO', 'BUSCANDO', 'PROCESSANDO', 'RESPONDENDO', 'INDEXANDO', 'VERIFICANDO'];
let time = 0;
let focusedAgent = 0;

function animateAgent(a) {
  const ud = a.userData;
  const w = ud.walkCycle + time * 0.08;
  const moving = Math.abs(a.position.x - ud.tx) > 0.1 || Math.abs(a.position.z - ud.tz) > 0.1;
  const speed = moving ? 1 : 0;

  // Walk animation
  const swing = Math.sin(w) * 0.35 * speed;
  if (ud.legL) ud.legL.rotation.x = swing;
  if (ud.legR) ud.legR.rotation.x = -swing;
  if (ud.armL) ud.armL.rotation.x = -swing * 0.7;
  if (ud.armR) ud.armR.rotation.x = swing * 0.7;

  // Breathing / idle bob
  a.position.y = Math.sin(time * 0.03 + ud.walkCycle) * 0.02;

  // Move toward target
  const dx = ud.tx - a.position.x;
  const dz = ud.tz - a.position.z;
  const dist = Math.sqrt(dx*dx + dz*dz);
  if (dist > 0.1) {
    const spd = 0.04;
    a.position.x += (dx/dist) * spd;
    a.position.z += (dz/dist) * spd;
    // Face direction
    a.rotation.y = Math.atan2(dx, dz);
  }

  // Random new target
  ud.moveTimer--;
  if (ud.moveTimer <= 0) {
    ud.moveTimer = 150 + Math.floor(Math.random() * 200);
    // Random office position
    const positions = [
      [-8,-7],[-4,-7],[0,-7],[-8,-4],[-4,-4],
      [-8,-1],[-4,-1],[-3,-3],[0,-3],[3,-2],
      [-1,2],[3,3],[6,-3],
    ];
    const p = positions[Math.floor(Math.random() * positions.length)];
    ud.tx = p[0] + (Math.random()-0.5);
    ud.tz = p[1] + (Math.random()-0.5);
    if (Math.random() < 0.3) {
      ud.task = tasks[Math.floor(Math.random() * tasks.length)];
      if (a === agentObjects[0]) {
        document.getElementById('ze-status').textContent = ud.task;
        document.getElementById('ap-task').textContent = ud.task + '...';
      }
    }
  }
}

// ── PROJECT TO SCREEN ─────────────────────────
function projectToScreen(worldPos) {
  const v = worldPos.clone().project(camera);
  return {
    x: (v.x + 1) / 2 * window.innerWidth,
    y: -(v.y - 1) / 2 * window.innerHeight,
  };
}

function updateNameTags() {
  const tagIds = ['nametag-ze', 'nametag-ops', 'nametag-fin'];
  agentObjects.forEach((a, i) => {
    const tag = document.getElementById(tagIds[i]);
    if (!tag) return;
    // Position above agent head
    const headPos = new THREE.Vector3();
    a.getWorldPosition(headPos);
    headPos.y += 2.5;
    const screen = projectToScreen(headPos);
    tag.style.left = screen.x + 'px';
    tag.style.top = screen.y + 'px';
    tag.style.display = 'flex';
  });
}

// ── RENDER LOOP ───────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  time++;

  agentObjects.forEach(animateAgent);
  updateNameTags();
  updateClock();

  renderer.render(scene, camera);
}

animate();

// ── CLOCK ─────────────────────────────────────
function updateClock() {
  if (time % 60 !== 0) return;
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock-bottom').textContent = `${h}:${m}:${s}`;
}

// ── FOCUS / INTERACTION ───────────────────────
const agentInfo = [
  { name: 'ZE 🧠', role: 'COO DIGITAL · BRAÇO DIREITO', status: 'ONLINE', model: 'Sonnet 4.6', mem: 'QMD · 12 docs' },
  { name: 'OPS ⚙️', role: 'OPERADOR TÉCNICO · INFRA', status: 'STANDBY', model: 'Haiku 3.5', mem: '—' },
  { name: 'FIN 📊', role: 'FINANCEIRO · MÉTRICAS', status: 'IDLE', model: '—', mem: '—' },
];

function focusAgent(idx) {
  focusedAgent = idx;
  document.querySelectorAll('.agent-bubble').forEach((b,i) => b.classList.toggle('active', i===idx));
  const panel = document.getElementById('agent-panel');
  const info = agentInfo[idx];
  if (info) {
    panel.style.display = 'block';
    document.getElementById('ap-name').textContent = info.name;
    document.getElementById('ap-role').textContent = info.role;
  }
  // Fly camera toward agent
  const a = agentObjects[idx];
  if (a) {
    const target = a.position.clone();
    gsmoothTarget = target;
  }
}

window.focusAgent = focusAgent;
focusAgent(0);

// ── RESIZE ────────────────────────────────────
window.addEventListener('resize', () => {
  const asp = window.innerWidth / window.innerHeight;
  camera.left = -frustum * asp;
  camera.right = frustum * asp;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Click detection on agents
renderer.domElement.addEventListener('click', e => {
  const mouse = new THREE.Vector2(
    (e.clientX / window.innerWidth) * 2 - 1,
    -(e.clientY / window.innerHeight) * 2 + 1
  );
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(mouse, camera);
  agentObjects.forEach((a, i) => {
    const hits = raycaster.intersectObjects(a.children, true);
    if (hits.length > 0) focusAgent(i);
  });
});
</script>
